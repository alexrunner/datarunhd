<body>
    <!-- Barra de navegación con logout -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="logo.jpg" width="30" height="30" class="d-inline-block align-top" alt="">
                RUNNERS HD
            </a>
            <div class="navbar-nav ml-auto">
                <span class="navbar-text text-white mr-3" id="userDisplay"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <script>
        // Verificar si el usuario está logueado
        $(document).ready(function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                // Si no hay usuario logueado, redirigir al login
                window.location.href = 'login.html';
            } else {
                // Mostrar nombre del usuario
                $('#userDisplay').text(`Bienvenido, ${currentUser.nombre || currentUser.username}`);
            }
        });

        // Función para cerrar sesión
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
