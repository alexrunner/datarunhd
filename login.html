<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login - RUNNERS HD</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Arial', sans-serif;
      }
      
      .login-container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }
      
      .logo-container {
        text-align: center;
        margin-bottom: 30px;
      }
      
      .logo-container img {
        width: 80px;
        margin: 0 10px;
      }
      
      .login-title {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: bold;
      }
      
      .input-group {
        margin-bottom: 20px;
      }
      
      .input-group-prepend span {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
      }
      
      .form-control {
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 12px;
        font-size: 14px;
      }
      
      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
      }
      
      .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.3s;
      }
      
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      
      .alert {
        display: none;
        margin-top: 20px;
        padding: 10px;
        border-radius: 5px;
        text-align: center;
      }
      
      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      
      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      
      .register-link {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }
      
      .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }
      
      .register-link a:hover {
        text-decoration: underline;
      }
      
      .password-toggle {
        cursor: pointer;
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
      }
      
      .input-group {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo-container">
        <img src="logo.jpg" alt="Logo RUNNERS HD">
        <img src="logo2.png" alt="Logo CoRRe En ZaCaTeCas">
      </div>
      
      <h2 class="login-title">Acceso al Sistema</h2>
      <h6 class="text-center text-muted mb-4">BASE DE DATOS RUNNERS HD</h6>
      
      <form id="loginForm">
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
          </div>
          <input type="text" class="form-control" id="username" placeholder="Usuario" required>
        </div>
        
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
          </div>
          <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
        
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
        
        <div class="alert" id="loginAlert" role="alert"></div>
        
        <div class="register-link">
          <p>¿No tienes cuenta? <a href="#" id="showRegister">Regístrate</a></p>
        </div>
      </form>
      
      <!-- Formulario de registro (oculto inicialmente) -->
      <form id="registerForm" style="display: none;">
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
          </div>
          <input type="text" class="form-control" id="regNombre" placeholder="Nombre completo" required>
        </div>
        
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          </div>
          <input type="email" class="form-control" id="regEmail" placeholder="Correo electrónico" required>
        </div>
        
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
          </div>
          <input type="text" class="form-control" id="regUsername" placeholder="Usuario" required>
        </div>
        
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
          </div>
          <input type="password" class="form-control" id="regPassword" placeholder="Contraseña" required>
        </div>
        
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
          </div>
          <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirmar contraseña" required>
        </div>
        
        <button type="submit" class="btn-login">
          <i class="fas fa-user-plus"></i> Registrarse
        </button>
        
        <div class="alert" id="registerAlert" role="alert"></div>
        
        <div class="register-link">
          <p>¿Ya tienes cuenta? <a href="#" id="showLogin">Iniciar Sesión</a></p>
        </div>
      </form>
    </div>

    <!-- Scripts -->
    <script src="assets/jquery/jquery-3.3.1.min.js"></script>
    <script>
      $(document).ready(function() {
        // Toggle password visibility
        $('#togglePassword').click(function() {
          const password = $('#password');
          const type = password.attr('type') === 'password' ? 'text' : 'password';
          password.attr('type', type);
          $(this).toggleClass('fa-eye fa-eye-slash');
        });
        
        // Mostrar formulario de registro
        $('#showRegister').click(function(e) {
          e.preventDefault();
          $('#loginForm').hide();
          $('#registerForm').show();
          $('#loginAlert').hide();
        });
        
        // Mostrar formulario de login
        $('#showLogin').click(function(e) {
          e.preventDefault();
          $('#registerForm').hide();
          $('#loginForm').show();
          $('#registerAlert').hide();
        });
        
        // Login form submission
        $('#loginForm').submit(function(e) {
          e.preventDefault();
          
          const username = $('#username').val();
          const password = $('#password').val();
          
          // Obtener usuarios registrados
          const users = JSON.parse(localStorage.getItem('users')) || [];
          
          // Buscar usuario
          const user = users.find(u => u.username === username && u.password === password);
          
          if (user) {
            // Login exitoso
            $('#loginAlert').removeClass('alert-danger').addClass('alert-success').html('<i class="fas fa-check-circle"></i> ¡Login exitoso! Redirigiendo...').show();
            
            // Guardar sesión
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Redirigir a la página principal después de 2 segundos
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 2000);
          } else {
            // Login fallido
            $('#loginAlert').removeClass('alert-success').addClass('alert-danger').html('<i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos').show();
          }
        });
        
        // Register form submission
        $('#registerForm').submit(function(e) {
          e.preventDefault();
          
          const nombre = $('#regNombre').val();
          const email = $('#regEmail').val();
          const username = $('#regUsername').val();
          const password = $('#regPassword').val();
          const confirmPassword = $('#regConfirmPassword').val();
          
          // Validaciones
          if (password !== confirmPassword) {
            $('#registerAlert').removeClass('alert-success').addClass('alert-danger').html('<i class="fas fa-exclamation-circle"></i> Las contraseñas no coinciden').show();
            return;
          }
          
          if (password.length < 6) {
            $('#registerAlert').removeClass('alert-success').addClass('alert-danger').html('<i class="fas fa-exclamation-circle"></i> La contraseña debe tener al menos 6 caracteres').show();
            return;
          }
          
          // Obtener usuarios existentes
          const users = JSON.parse(localStorage.getItem('users')) || [];
          
          // Verificar si el usuario ya existe
          if (users.some(u => u.username === username)) {
            $('#registerAlert').removeClass('alert-success').addClass('alert-danger').html('<i class="fas fa-exclamation-circle"></i> El nombre de usuario ya existe').show();
            return;
          }
          
          // Crear nuevo usuario
          const newUser = {
            nombre: nombre,
            email: email,
            username: username,
            password: password,
            fechaRegistro: new Date().toISOString()
          };
          
          // Guardar usuario
          users.push(newUser);
          localStorage.setItem('users', JSON.stringify(users));
          
          // Mostrar mensaje de éxito
          $('#registerAlert').removeClass('alert-danger').addClass('alert-success').html('<i class="fas fa-check-circle"></i> ¡Registro exitoso! Ahora puedes iniciar sesión').show();
          
          // Limpiar formulario
          $('#registerForm')[0].reset();
          
          // Cambiar a login después de 2 segundos
          setTimeout(function() {
            $('#registerForm').hide();
            $('#loginForm').show();
            $('#registerAlert').hide();
          }, 2000);
        });
        
        // Verificar si ya hay sesión activa
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser && window.location.pathname.includes('login.html')) {
          window.location.href = 'index.html';
        }
      });
    </script>
  </body>
</html>
